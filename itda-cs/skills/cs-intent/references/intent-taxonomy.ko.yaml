# CS 인텐트(문의유형) 분류체계 — 상위 10군 (cs-intent v1.0)
# 원천: aspect-sentiment 목적-적합성 검토(#26 → 자매 분리 #27).
# "왜 연락했나"를 분류. 측면-감정(aspect-sentiment)과 직교.
#
# 규칙:
# - primary_intent 는 아래 closed-set 인텐트군만. 매핑 불가 시 `기타`.
# - 인텐트 ≠ 감정. 긍·부정 라벨 금지(그건 aspect-sentiment).
# - 운영 소분류(~50종) → 인텐트군 결정론 매핑(legacy_map)은 P1에서 확정(여기선 군 정의만).
# - 사용자가 커스텀 YAML 제공 시 이 파일 대신 그것을 정본으로.

taxonomy_version: "cs-intent-1.0"
domains: [cs]

intents:
  주문취소변경: { ko: "주문 취소·부분취소·주문변경·옵션변경·주문이력 조회" }
  배송:         { ko: "배송 조회·지연·배송지 변경·오배송·분실/파손·출고지연" }
  반품교환:     { ko: "반품·교환 요청·기준 문의·수거 요청/지연" }
  환불보상:     { ko: "환불·반품비용·보상 처리/지연" }
  상품정보:     { ko: "사양·모델명·사이즈·구성/패키지·소재/원산지·정품 여부" }
  재고품절:     { ko: "재입고 일정·품절·주문 후 품절 문의" }
  품질불량:     { ko: "기능/성능 불량·봉제/마모/흠집/찢어짐·이염·AS 요청" }
  가격결제:     { ko: "가격 문의·카드/대금/간편결제·가격택/보안택 문제" }
  쿠폰혜택:     { ko: "쿠폰·포인트 적립/사용·사은품/경품·이벤트/프로모션" }
  회원기타:     { ko: "회원정보 확인/변경·매장 위치/연락처·상담사 연결·심의기준·기타" }
  기타:         { ko: "위 10군에 매핑 불가" }

# legacy_map (운영 소분류 → 인텐트군): P1 사람 승인 게이트에서 결정론적으로 확정.
# unmappable_ratio 를 1급 KPI로 로깅해 인텐트군 적정성 역검증.
legacy_map: {}
