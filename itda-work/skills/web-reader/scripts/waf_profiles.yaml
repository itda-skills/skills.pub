# WAF Product Profiles — never site-specific.
#
# Adapted from fivetaku insane-search engine/waf_profiles.yaml (MIT,
# Copyright (c) 2026 fivetaku).
#
# NO-SITE-NAME RULE:
#   * Key names are WAF products, not sites.
#   * Detectors use product artifacts (cookies / headers / vendor strings).
#   * Site-specific selectors belong to runtime success_selectors, not here.

_meta:
  schema_version: 1
  last_reviewed: "2026-04-21"

akamai_bot_manager:
  detectors:
    cookie: ["_abck", "bm_sz", "ak_bmsc", "bm_sv", "bm_so"]
    header: ["X-Akamai-*"]
    server_contains: ["AkamaiGHost"]
    body: ["sec-if-cpt-container", "Powered and protected by Akamai"]
  confidence_rules:
    strong: 2
    weak: 1
  capabilities_needed:
    - needs_real_tls_stack
    - needs_js_exec
  tls_impersonate_candidates:
    - [safari, safari15_3, safari15_5, safari17_0]
    - [safari_ios, safari17_2_ios]
    - [chrome99, chrome100, chrome101, chrome104, chrome110, chrome116, chrome119, chrome124, chrome131, chrome133a, chrome136]
    - [chrome_android, chrome131_android]
    - [edge99, edge101]
  tls_impersonate_avoid:
    - safari18_0
    - chrome107
    - chrome120
    - chrome123
    - chrome145
    - chrome146
    - firefox
    - firefox133
    - firefox135
  referer_strategies:
    - self_root
  url_transform_order:
    - original
    - mobile_subdomain
  fallback_when_challenge:
    - curl_grid_exhaust
    - lightpanda_dynamic
    - hyve_mcp

cloudflare_turnstile:
  detectors:
    cookie: ["cf_clearance", "__cf_bm", "__cfduid"]
    header: ["cf-ray", "cf-cache-status"]
    server_contains: ["cloudflare"]
    body: ["Just a moment...", "Checking your browser", "cf-chl-bypass", "Attention Required! | Cloudflare"]
  capabilities_needed:
    - needs_js_exec
  tls_impersonate_candidates:
    - [chrome, chrome_android]
  referer_strategies:
    - google_search
    - self_root
  url_transform_order:
    - original
  fallback_when_challenge:
    - lightpanda_dynamic
    - hyve_mcp

f5_big_ip:
  detectors:
    cookie: ["BigIPServer", "TS01*", "F5_*"]
    body: ["The requested URL was rejected", "support ID is:"]
  capabilities_needed:
    - needs_real_tls_stack
  tls_impersonate_candidates:
    - [safari, chrome]
  referer_strategies:
    - self_root
  url_transform_order:
    - original

aws_waf:
  detectors:
    cookie: ["aws-waf-token"]
    header: ["x-amzn-requestid", "x-amzn-errortype", "x-amzn-waf-*"]
  capabilities_needed:
    - needs_real_tls_stack
  tls_impersonate_candidates:
    - [chrome]
  referer_strategies:
    - self_root
  url_transform_order:
    - original

datadome_probable:
  detectors:
    cookie: ["datadome"]
    body: ["DataDome"]
  capabilities_needed:
    - needs_real_tls_stack
    - needs_js_exec
  tls_impersonate_candidates:
    - [safari, chrome]
  referer_strategies:
    - self_root
  url_transform_order:
    - original
  fallback_when_challenge:
    - lightpanda_dynamic
    - hyve_mcp

perimeterx_human:
  detectors:
    cookie: ["_px3", "_pxhd", "_px2", "pxcts"]
    body: ["px-captcha", "Press & Hold to confirm you are a human"]
  capabilities_needed:
    - needs_real_tls_stack
    - needs_js_exec
  tls_impersonate_candidates:
    - [safari, chrome]
  referer_strategies:
    - self_root
  url_transform_order:
    - original
  fallback_when_challenge:
    - lightpanda_dynamic
    - hyve_mcp

unknown_challenge:
  detectors: {}
  confidence_rules:
    strong: 0
    weak: 0
  capabilities_needed:
    - needs_js_exec
  tls_impersonate_candidates:
    - [safari, chrome, firefox]
    - [safari_ios, chrome_android]
  referer_strategies:
    - self_root
    - google_search
    - none
  url_transform_order:
    - original
    - mobile_subdomain
  fallback_when_challenge:
    - lightpanda_dynamic
    - hyve_mcp
